<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <!-- GitHub Pages SPA routing: restore URL after 404 redirect -->
    <script>
      (function() {
        var redirect = sessionStorage.getItem('sol_redirect')
        if (redirect) {
          sessionStorage.removeItem('sol_redirect')
          // Replace state without triggering a full navigation
          window.history.replaceState(null, null, redirect)
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>روح النظام | Spirit of Law</title>
    <meta name="description" content="مكتب روح النظام للمحاماة والاستشارات القانونية في المملكة العربية السعودية — Spirit of Law, a premier legal consultancy in Saudi Arabia." />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="روح النظام | Spirit of Law" />
    <meta property="og:description" content="مكتب محاماة واستشارات قانونية متميز في المملكة العربية السعودية" />
    <meta property="og:locale" content="ar_SA" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Arabic: Noto Naskh Arabic — elegant, highly legible Arabic serif
      Latin: Cormorant Garamond — refined, authoritative legal aesthetic
      UI/Body: DM Sans — clean, modern sans for interface elements
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
